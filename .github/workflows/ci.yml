name: CI Workflow

on:
  push:
    branches: ["main"]

jobs: # 실행할 작업 정의
  build: # build라는 작업 설정
    runs-on: ubuntu-latest # 실행환경 설정(build라는 job이 이 환경에서 실행됨)

    steps: # jobs안에서 실행될 단계
      - uses: actions/checkout@v3 # 현재 레포의 코드를 checkout(가져옴)

      - name: JDK 17 설정
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 빌드 및 테스트
        run: ./gradlew clean build